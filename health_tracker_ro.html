<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Tracker RO</title>

  <!-- Google font for futuristic look -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0a0f1f, #020409);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      padding: 30px;
    }

    /* cursor light */
    .cursor-light {
      position: fixed;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(0,255,255,0.35), rgba(0,255,255,0.05), transparent);
      transform: translate(-50%, -50%);
      z-index: 0;
      transition: opacity 0.15s ease;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    header h1 {
      font-size: 48px;
      color: #00ffff;
      text-shadow: 0 0 15px #00ffff;
      margin-bottom: 10px;
    }

    header p {
      color: #8fbfff;
      font-size: 14px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      position: relative;
      z-index: 1;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 18px;
      padding: 25px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 20px rgba(0,255,255,0.15);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 0 30px rgba(0,255,255,0.4);
    }

    .card h2 {
      color: #00ffff;
      margin-bottom: 20px;
      font-size: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(0,255,255,0.3);
      background: rgba(0,0,0,0.5);
      color: white;
      margin-bottom: 12px;
      outline: none;
    }

    input:focus {
      border-color: #00ffff;
      box-shadow: 0 0 10px rgba(0,255,255,0.5);
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #00ffff, #0088ff);
      color: black;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px #00ffff;
    }

    ul {
      list-style: none;
      margin-top: 10px;
    }

    li {
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,255,255,0.08);
      border: 1px solid rgba(0,255,255,0.25);
      margin-bottom: 8px;
      font-size: 14px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .stat input {
      width: 80px;
      margin: 0;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      color: #6fa6ff;
    }
  </style>
</head>

<body>

<div class="cursor-light" id="cursorLight"></div>

<header>
  <h1>Health Tracker RO</h1>
  <p>Track medicine • water • sleep • steps • daily health</p>
</header>

<div class="dashboard">

  <!-- Medicine tracker -->
  <div class="card">
    <h2>Medicine Tracker</h2>

    <input type="text" id="medicineInput" placeholder="Enter medicine name">
    <button onclick="addMedicine()">Add Medicine</button>

    <ul id="medicineList"></ul>
  </div>

  <!-- Daily stats -->
  <div class="card">
    <h2>Daily Health</h2>

    <div class="stat">
      <label>Water</label>
      <input type="number" id="water" min="0">
    </div>

    <div class="stat">
      <label>Sleep</label>
      <input type="number" id="sleep" min="0">
    </div>

    <div class="stat">
      <label>Steps</label>
      <input type="number" id="steps" min="0">
    </div>

    <button onclick="saveDailyData()">Save Today</button>
  </div>

  <!-- Saved data -->
  <div class="card">
    <h2>Today's Saved Data</h2>
    <p id="savedData">Nothing saved yet.</p>
  </div>

</div>

<footer>
  Built with HTML + CSS + JavaScript • Ready for GitHub Pages
</footer>

<script>

/* CURSOR LIGHT EFFECT */
const cursor = document.getElementById("cursorLight");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* MEDICINE TRACKER */
function addMedicine() {
  const input = document.getElementById("medicineInput");
  const list = document.getElementById("medicineList");

  if (input.value.trim() === "") return;

  const li = document.createElement("li");
  li.textContent = input.value;
  list.appendChild(li);

  saveMedicines();
  input.value = "";
}

function saveMedicines() {
  const medicines = [];
  document.querySelectorAll("#medicineList li").forEach(item => {
    medicines.push(item.textContent);
  });
  localStorage.setItem("medicines", JSON.stringify(medicines));
}

function loadMedicines() {
  const medicines = JSON.parse(localStorage.getItem("medicines")) || [];
  medicines.forEach(med => {
    const li = document.createElement("li");
    li.textContent = med;
    document.getElementById("medicineList").appendChild(li);
  });
}

/* DAILY DATA */
function saveDailyData() {
  const water = document.getElementById("water").value;
  const sleep = document.getElementById("sleep").value;
  const steps = document.getElementById("steps").value;

  const data = {
    water: water,
    sleep: sleep,
    steps: steps,
    date: new Date().toLocaleDateString()
  };

  localStorage.setItem("dailyData", JSON.stringify(data));
  showSavedData();
}

function showSavedData() {
  const data = JSON.parse(localStorage.getItem("dailyData"));
  if (!data) return;

  document.getElementById("savedData").innerHTML =
    `Date: ${data.date}<br>Water: ${data.water} glasses<br>Sleep: ${data.sleep} hours<br>Steps: ${data.steps}`;
}

/* LOAD DATA ON START */
loadMedicines();
showSavedData();

</script>

</body>
</html>
